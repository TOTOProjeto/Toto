<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{baseLayout :: baseHead}"></head>
<body>

<nav th:replace="~{baseLayout :: navbar}"></nav>

<main>
  <div class="toto-page-header">
    <div class="container-xl">
      <div class="d-flex align-items-center gap-3">
        <a th:href="@{/equipes}" class="btn btn-toto-outline btn-sm">← Voltar</a>
        <div>
          <h1 class="toto-page-title" th:text="${equipeDTO.id != null} ? 'Editar Equipe' : 'Nova Equipe'">
            Nova Equipe
          </h1>
          <p class="toto-page-subtitle" th:text="${equipeDTO.id != null} ? 'Altere os dados da equipe abaixo.' : 'Preencha os dados para agrupar seus usuários.'"></p>
        </div>
      </div>
    </div>
  </div>

  <div class="container-xl py-3">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="toto-form-card">

          <form th:action="${equipeDTO.id != null} ? @{'/equipes/' + ${equipeDTO.id} + '/edit'} : @{/equipes/new}"
                th:object="${equipeDTO}" method="post" novalidate>

            <div class="mb-3">
              <label for="nome" class="toto-form-label">Nome da Equipe <span class="text-danger">*</span></label>
              <input type="text" id="nome" th:field="*{nome}"
                     th:class="${#fields.hasErrors('nome')} ? 'toto-form-control is-invalid' : 'toto-form-control'"
                     placeholder="Ex: Equipe de Backend"/>
              <span th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}" class="toto-invalid-feedback"></span>
            </div>

            <div class="mb-3">
              <label for="descricao" class="toto-form-label">Descrição</label>
              <textarea id="descricao" th:field="*{descricao}" rows="3" class="toto-form-control"
                        placeholder="Descreva o propósito da equipe..."></textarea>
            </div>

            <div class="mb-3">
              <label for="responsavelId" class="toto-form-label">Responsável (Líder)</label>
              <!-- FIX: th:value="${null}" garante que a opção vazia envia null, não string vazia -->
              <select id="responsavelId" th:field="*{responsavelId}" class="toto-form-control">
                <option th:value="${null}">-- Nenhum --</option>
                <option th:each="usuario : ${usuarios}"
                        th:value="${usuario.id}"
                        th:text="${usuario.nome}">Usuário</option>
              </select>
            </div>

            <div class="mb-4">
              <label for="membrosIds" class="toto-form-label">Membros da Equipe</label>
              <div class="small text-muted mb-2">
                Segure <strong>Ctrl</strong> (Windows) ou <strong>Cmd</strong> (Mac) para selecionar ou remover vários usuários.
              </div>
              <select id="membrosIds" th:field="*{membrosIds}" class="toto-form-control" multiple="multiple" style="height: 140px;">
                <option th:each="usuario : ${usuarios}"
                        th:value="${usuario.id}"
                        th:text="${usuario.nome}">Usuário</option>
              </select>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-toto flex-grow-1">
                <span th:text="${equipeDTO.id != null} ? 'Salvar Alterações' : 'Criar Equipe'">Salvar</span>
              </button>
              <a th:href="@{/equipes}" class="btn btn-toto-outline">Cancelar</a>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</main>

<footer th:replace="~{baseLayout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
