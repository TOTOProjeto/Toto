<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{baseLayout :: baseHead}"></head>
<body>
<nav th:replace="~{baseLayout :: navbar}"></nav>
<main>
  <div class="container-xl py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 text-center">
        <div style="font-size: 5rem; line-height: 1; margin-bottom: 1rem; opacity: 0.15; font-weight: 700; letter-spacing: -0.04em; color: var(--toto-text);">
          404
        </div>
        <div style="width: 56px; height: 56px; background: var(--toto-yellow-light); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 1.75rem;">
          &#128269;
        </div>
        <h2 class="fw-700 mb-2" style="letter-spacing: -0.02em;"
            th:text="${titulo} ?: 'Página não encontrada'">Página não encontrada</h2>
        <p class="text-muted mb-4" style="font-size: 1rem; line-height: 1.6;"
           th:text="${mensagem} ?: 'A página que você tentou acessar não existe ou foi removida.'">
          A página não existe.
        </p>

        <!-- Detalhe técnico (opcional, pode remover em produção) -->
        <div th:if="${detalhe}" class="mb-4">
          <code style="font-size: 0.78rem; background: var(--toto-bg); padding: 4px 10px; border-radius: 6px; color: var(--toto-muted);"
                th:text="${detalhe}"></code>
        </div>

        <div class="d-flex gap-2 justify-content-center flex-wrap">
          <a th:href="@{/}" class="btn btn-toto">Ir para o Início</a>
          <a th:href="@{/tarefas}" class="btn btn-toto-outline">Ver Tarefas</a>
          <button onclick="history.back()" class="btn btn-toto-outline">&#8592; Voltar</button>
        </div>
      </div>
    </div>
  </div>
</main>
<footer th:replace="~{baseLayout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
