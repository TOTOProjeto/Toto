<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{baseLayout :: baseHead}"></head>
<body>

<nav th:replace="~{baseLayout :: navbar}"></nav>

<main>
  <div class="toto-page-header">
    <div class="container-xl">
      <div class="d-flex align-items-center gap-3">
        <a th:href="@{/tarefas}" class="btn btn-toto-outline btn-sm">&#8592; Tarefas</a>
        <h1 class="toto-page-title" th:text="${tarefa != null} ? ${tarefa.titulo} : 'Tarefa não encontrada'">
          Detalhes da Tarefa
        </h1>
      </div>
    </div>
  </div>

  <div class="container-xl py-3">
    <div th:replace="~{baseLayout :: flashMessages}"></div>

    <!-- Tarefa não encontrada -->
    <div th:if="${tarefa == null}" class="toto-empty">
      <div class="toto-empty-icon">&#9888;</div>
      <h5>Tarefa não encontrada</h5>
      <p class="mb-3" th:text="${errorMessage}">Esta tarefa não existe ou foi removida.</p>
      <a th:href="@{/tarefas}" class="btn btn-toto">Ver todas as tarefas</a>
    </div>

    <!-- Detalhes da tarefa -->
    <div th:if="${tarefa != null}" class="row g-3">
      <div class="col-lg-8">
        <div class="toto-detail-section mb-3">
          <div class="d-flex align-items-start justify-content-between mb-3">
            <span th:class="${'toto-priority toto-priority-' + (tarefa.prioridade ?: 3)}"
                  th:text="${'Prioridade ' + (tarefa.prioridade ?: '-')}">P3</span>
            <div class="d-flex gap-2">
              <a th:href="@{'/tarefas/' + ${tarefa.id} + '/edit'}" class="btn btn-toto-outline btn-sm">Editar</a>
              <form th:action="@{'/tarefas/' + ${tarefa.id} + '/delete'}" method="post"
                    onsubmit="return confirm('Confirmar exclusão?')">
                <button type="submit" class="btn btn-sm"
                        style="background: #FEE2E2; color: #B91C1C; border: 1px solid #FCA5A5; border-radius: 8px; padding: 0.35rem 0.75rem;">
                  Excluir
                </button>
              </form>
            </div>
          </div>

          <div class="mb-1">
            <div class="toto-detail-label">Título</div>
            <div class="toto-detail-value fs-5" th:text="${tarefa.titulo}">Título</div>
          </div>
        </div>

        <div class="toto-detail-section">
          <div class="toto-detail-label mb-2">Descrição</div>
          <p th:text="${tarefa.descricao ?: 'Sem descrição.'}" class="mb-0" style="line-height: 1.6;">Descrição</p>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="toto-detail-section">
          <h6 class="fw-600 mb-3" style="font-size: 0.9rem;">Informações</h6>

          <div class="mb-3">
            <div class="toto-detail-label">Data de criação</div>
            <div class="toto-detail-value"
                 th:text="${tarefa.dataCriacao != null} ? ${#temporals.format(tarefa.dataCriacao, 'dd/MM/yyyy')} : '—'">
            </div>
          </div>

          <div class="mb-3">
            <div class="toto-detail-label">Prazo</div>
            <div class="toto-detail-value"
                 th:text="${tarefa.prazo != null} ? ${#temporals.format(tarefa.prazo, 'dd/MM/yyyy')} : '—'">
            </div>
          </div>

          <div class="mb-3">
            <div class="toto-detail-label">Responsável</div>
            <div class="toto-detail-value"
                 th:text="${tarefa.responsavel != null} ? ${tarefa.responsavel.nome} : 'Não atribuído'">
            </div>
          </div>

          <div class="mb-3">
            <div class="toto-detail-label">Equipe</div>
            <div class="toto-detail-value"
                 th:text="${tarefa.equipe != null} ? ${tarefa.equipe.nome} : '—'">
            </div>
          </div>

          <div class="mb-3">
            <div class="toto-detail-label">Status</div>
            <div th:if="${tarefa.status != null}">
              <span class="badge" style="background: var(--toto-yellow-light); color: var(--toto-text); font-weight: 500;"
                    th:text="${tarefa.status.nome}"></span>
            </div>
            <div th:if="${tarefa.status == null}" class="toto-detail-value">—</div>
          </div>

          <div th:if="${tarefa.marcas != null and !tarefa.marcas.isEmpty()}">
            <div class="toto-detail-label">Labels</div>
            <div class="d-flex flex-wrap gap-1 mt-1">
              <span th:each="label : ${tarefa.marcas}"
                    class="badge"
                    style="background: #EDE9FE; color: #5B21B6; font-weight: 500;"
                    th:text="${label.nome}">Label</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<footer th:replace="~{baseLayout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
