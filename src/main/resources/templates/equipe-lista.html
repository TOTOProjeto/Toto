<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{baseLayout :: baseHead}"></head>
<body>

<nav th:replace="~{baseLayout :: navbar}"></nav>

<main>
  <div class="toto-page-header">
    <div class="container-xl">
      <div class="d-flex align-items-start justify-content-between">
        <div>
          <h1 class="toto-page-title">Equipes</h1>
          <p class="toto-page-subtitle">Gerencie os times de trabalho e seus membros.</p>
        </div>
        <a th:href="@{/equipes/new}" class="btn btn-toto d-flex align-items-center gap-2">
          <span>+</span> Nova Equipe
        </a>
      </div>
    </div>
  </div>

  <div class="container-xl py-3">
    <div th:replace="~{baseLayout :: flashMessages}"></div>

    <div th:if="${equipes != null and !equipes.isEmpty()}" class="row g-3">
      <div th:each="eq : ${equipes}" class="col-sm-6 col-md-4 col-lg-3">
        <div class="toto-card p-3 d-flex flex-column h-100">
          <div class="toto-logo-badge mb-2" style="background: #DBEAFE; color: #1D4ED8;">
            Equipe
          </div>
          <h6 class="fw-600 mb-1" th:text="${eq.nome}">Nome</h6>
          <p class="text-muted small mb-3 flex-grow-1" th:text="${eq.descricao != null ? eq.descricao : 'Sem descricao'}">Desc</p>
          <div class="d-flex gap-2 mt-auto">
            <a th:href="@{'/equipes/' + ${eq.id} + '/edit'}" class="btn btn-toto-outline btn-sm flex-grow-1">Editar</a>
            <form th:action="@{'/equipes/' + ${eq.id} + '/delete'}" method="post">
              <button type="submit" class="toto-action-btn danger">X</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div th:if="${equipes == null or equipes.isEmpty()}" class="toto-empty">
      <h5>Nenhuma equipe encontrada</h5>
      <a th:href="@{/equipes/new}" class="btn btn-toto">Criar primeira equipe</a>
    </div>
  </div>
</main>

<footer th:replace="~{baseLayout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
