<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{baseLayout :: baseHead}"></head>
<body>

<nav th:replace="~{baseLayout :: navbar}"></nav>

<main>
  <div class="toto-page-header">
    <div class="container-xl">
      <div class="d-flex align-items-center gap-3">
        <a th:href="@{/usuarios}" class="btn btn-toto-outline btn-sm">← Voltar</a>
        <div>
          <h1 class="toto-page-title" th:text="${usuarioDTO.id != null} ? 'Editar Usuário' : 'Novo Usuário'">
            Novo Usuário
          </h1>
          <p class="toto-page-subtitle">Preencha as informações básicas do membro.</p>
        </div>
      </div>
    </div>
  </div>

  <div class="container-xl py-3">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="toto-form-card">

          <form th:action="${usuarioDTO.id != null} ? @{'/usuarios/' + ${usuarioDTO.id} + '/edit'} : @{/usuarios/new}"
                th:object="${usuarioDTO}" method="post" novalidate>

            <div class="mb-3">
              <label for="nome" class="toto-form-label">Nome Completo <span class="text-danger">*</span></label>
              <input type="text" id="nome" th:field="*{nome}"
                     th:class="${#fields.hasErrors('nome')} ? 'toto-form-control is-invalid' : 'toto-form-control'"
                     placeholder="Ex: Ana Silva"/>
              <span th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}" class="toto-invalid-feedback"></span>
            </div>

            <div class="mb-4">
              <label for="email" class="toto-form-label">E-mail <span class="text-danger">*</span></label>
              <input type="email" id="email" th:field="*{email}"
                     th:class="${#fields.hasErrors('email')} ? 'toto-form-control is-invalid' : 'toto-form-control'"
                     placeholder="Ex: ana.silva@exemplo.com"/>
              <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="toto-invalid-feedback"></span>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-toto flex-grow-1">
                <span th:text="${usuarioDTO.id != null} ? 'Salvar Alterações' : 'Criar Usuário'">Salvar</span>
              </button>
              <a th:href="@{/usuarios}" class="btn btn-toto-outline">Cancelar</a>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</main>

<footer th:replace="~{baseLayout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
