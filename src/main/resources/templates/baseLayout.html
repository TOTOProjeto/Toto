<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="baseHead">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="#{app.title}">Toto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>

<nav th:fragment="navbar" class="toto-navbar navbar navbar-expand-lg">
  <div class="container-xl">
    <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
      <div class="toto-logo-badge">T</div>
      <span class="toto-logo-text">Toto</span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarMain" aria-controls="navbarMain"
            aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarMain">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/}" th:classappend="${currentUri == '/'} ? 'active'">
            Início
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/tarefas}" th:classappend="${currentUri != null and currentUri.startsWith('/tarefas')} ? 'active'">
            Tarefas
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/diagramas}" th:classappend="${currentUri != null and currentUri.startsWith('/diagramas')} ? 'active'">
            Diagramas
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/equipes}" th:classappend="${currentUri != null and currentUri.startsWith('/equipes')} ? 'active'">
            Equipes
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/usuarios}" th:classappend="${currentUri != null and currentUri.startsWith('/usuarios')} ? 'active'">
            Usuários
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div th:fragment="flashMessages">
  <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show toto-alert" role="alert">
    <span th:text="${successMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
  </div>
  <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show toto-alert" role="alert">
    <span th:text="${errorMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
  </div>
</div>

<footer th:fragment="footer" class="toto-footer">
  <div class="container-xl">
    <div class="d-flex align-items-center justify-content-between">
      <span class="toto-footer-brand">Toto &mdash; Gestão de Tarefas</span>
      <span class="toto-footer-copy">Projeto Web Dev &copy; 2025</span>
    </div>
  </div>
</footer>

</html>
