<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{baseLayout :: baseHead}"></head>
<body>
<nav th:replace="~{baseLayout :: navbar}"></nav>
<main>
  <div class="container-xl py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 text-center">
        <div style="font-size: 5rem; line-height: 1; margin-bottom: 1rem; opacity: 0.15; font-weight: 700; letter-spacing: -0.04em; color: var(--toto-text);">
          500
        </div>
        <div style="width: 56px; height: 56px; background: #FEE2E2; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 1.75rem;">
          &#9888;
        </div>
        <h2 class="fw-700 mb-2" style="letter-spacing: -0.02em;"
            th:text="${titulo} ?: 'Erro interno do servidor'">Erro interno</h2>
        <p class="text-muted mb-4" style="font-size: 1rem; line-height: 1.6;"
           th:text="${mensagem} ?: 'Ocorreu um erro inesperado. Por favor, tente novamente.'">
          Erro inesperado.
        </p>

        <!-- Detalhe técnico -->
        <div th:if="${detalhe}" class="mb-4">
          <code style="font-size: 0.78rem; background: #FEF2F2; padding: 6px 12px; border-radius: 6px; color: #B91C1C; border: 1px solid #FCA5A5; display: inline-block; max-width: 100%; word-break: break-all;"
                th:text="${detalhe}"></code>
        </div>

        <div class="d-flex gap-2 justify-content-center flex-wrap">
          <a th:href="@{/}" class="btn btn-toto">Ir para o Início</a>
          <button onclick="history.back()" class="btn btn-toto-outline">&#8592; Voltar</button>
        </div>
      </div>
    </div>
  </div>
</main>
<footer th:replace="~{baseLayout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
