<!-- ═══════════════════════════════════════════════════════════
     diagrama-lista.html
     ═══════════════════════════════════════════════════════════ -->
<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{baseLayout :: baseHead}"></head>
<body>
<nav th:replace="~{baseLayout :: navbar}"></nav>
<main>
  <div class="toto-page-header">
    <div class="container-xl">
      <div class="d-flex align-items-start justify-content-between">
        <div>
          <h1 class="toto-page-title">Diagramas</h1>
          <p class="toto-page-subtitle">Todos os quadros Kanban cadastrados.</p>
        </div>
        <a th:href="@{/diagramas/new}" class="btn btn-toto">＋ Novo Diagrama</a>
      </div>
    </div>
  </div>
  <div class="container-xl py-3">
    <div th:replace="~{baseLayout :: flashMessages}"></div>
    <div class="row g-3" th:if="${diagramas != null and !diagramas.isEmpty()}">
      <div class="col-sm-6 col-md-4 col-lg-3" th:each="d : ${diagramas}">
        <div class="toto-card p-3">
          <div class="toto-logo-badge mb-2" style="background: var(--toto-yellow-light); color: var(--toto-yellow-dark); font-size: 1.1rem;">&#9783;</div>
          <h6 class="fw-600 mb-1" th:text="${d.nome}">Nome</h6>
          <p class="text-muted small mb-3" th:text="${d.descricao ?: 'Sem descrição'}">Desc</p>
          <div class="d-flex gap-2">
            <a th:href="@{'/diagramas/' + ${d.id}}" class="btn btn-toto-outline btn-sm flex-grow-1">Abrir</a>
            <form th:action="@{'/diagramas/' + ${d.id} + '/delete'}" method="post"
                  onsubmit="return confirm('Excluir diagrama?')">
              <button type="submit" class="toto-action-btn danger" title="Excluir">&#128465;</button>
            </form>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-md-4 col-lg-3">
        <a th:href="@{/diagramas/new}" class="toto-card-novo p-3"><span>＋</span><span>Novo Diagrama</span></a>
      </div>
    </div>
    <div th:if="${diagramas == null or diagramas.isEmpty()}" class="toto-empty">
      <div class="toto-empty-icon">&#9783;</div>
      <h5>Nenhum diagrama encontrado</h5>
      <a th:href="@{/diagramas/new}" class="btn btn-toto mt-2">Criar primeiro diagrama</a>
    </div>
  </div>
</main>
<footer th:replace="~{baseLayout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
