<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Tarefas</title>
</head>
<body>

    <h1>Tarefas</h1>

    <div th:if="${successMessage}" style="color: green;">
        <p th:text="${successMessage}"></p>
    </div>

    <a href="/tarefas/new">+ Nova Tarefa</a>

    <br><br>

    <table border="1" cellpadding="5" cellspacing="0">
        <thead>
            <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Prazo</th>
                <th>Prioridade</th>
                <th>Responsável</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="tarefa : ${tarefas}">
                <td th:text="${tarefa.id}"></td>
                <td th:text="${tarefa.titulo}"></td>
                <td th:text="${tarefa.prazo}"></td>
                <td th:text="${tarefa.prioridade}"></td>
                <td th:text="${tarefa.responsavel != null ? tarefa.responsavel.nome : '-'}"></td>
                <td>
                    <a th:href="@{/tarefas/{id}(id=${tarefa.id})}">Ver Detalhes</a>
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>
