<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{baseLayout :: baseHead}"></head>
<body>
<nav th:replace="~{baseLayout :: navbar}"></nav>

<main>
  <div class="toto-page-header">
    <div class="container-xl text-center">
      <h1 class="toto-page-title" style="font-size: 5rem;">404</h1>
      <p class="toto-page-subtitle fs-5">Página não encontrada</p>
    </div>
  </div>

  <div class="container-xl py-5 text-center">
    <p class="mb-1 text-muted">
      O caminho <code th:text="${caminho}"></code> não existe nesta aplicação.
    </p>
    <p class="mb-4 text-muted" th:text="${mensagem}"></p>
    <a href="/" class="btn btn-toto">← Voltar para o início</a>
  </div>
</main>

<footer th:replace="~{baseLayout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
