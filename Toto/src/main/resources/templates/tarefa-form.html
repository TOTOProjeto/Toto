<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nova Tarefa</title>
</head>
<body>

    <h1>Criar Nova Tarefa</h1>

    <div th:if="${errorMessage}" style="color: red;">
        <p th:text="${errorMessage}"></p>
    </div>

    <form th:action="@{/tarefas/new}" th:object="${tarefaDTO}" method="post">

        <div>
            <label for="nome">Título:</label>
            <input type="text" id="nome" th:field="*{nome}" placeholder="Título da tarefa"/>
        </div>

        <div>
            <label for="descricao">Descrição:</label>
            <input type="text" id="descricao" th:field="*{descricao}" placeholder="Descrição da tarefa"/>
        </div>

        <div>
            <label for="prazo">Prazo:</label>
            <input type="date" id="prazo" th:field="*{prazo}"/>
        </div>

        <div>
            <label for="prioridade">Prioridade (1 a 5):</label>
            <input type="number" id="prioridade" th:field="*{prioridade}" min="1" max="5"/>
        </div>

        <div>
            <label for="usuarioId">ID do Responsável:</label>
            <input type="number" id="usuarioId" th:field="*{usuarioId}"/>
        </div>

        <div>
            <label for="equipeId">ID da Equipe:</label>
            <input type="number" id="equipeId" th:field="*{equipeId}"/>
        </div>

        <div>
            <label for="particaoId">ID da Partição:</label>
            <input type="number" id="particaoId" th:field="*{particaoId}"/>
        </div>

        <br>
        <button type="submit">Salvar Tarefa</button>
        <a href="/tarefas">← Voltar</a>

    </form>

</body>
</html>
